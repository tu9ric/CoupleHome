{% extends 'todo/main.html' %}
{% block content %}
<div class="header-bar">
    <h1>Register</h1>
</div>

<div class="card-body">
    <form action="" method = "post" >
        {% csrf_token %}

        <!--{{ form.as_p }}-->

        <label>{{ form.username.label }}</label>
        {{ form.username }}

        <label>{{ form.password1.label }}</label>
        {{ form.password1 }}

        <label>{{ form.password2.label }}</label>
        {{ form.password2 }}

        <br> <br>
        <input class = "button" type="submit" value="Register new account">

        <small><p>Do you have an account already? <a href="{% url 'login' %}">Login</a></p></small>
</form>
</div>

{% endblock content %}
