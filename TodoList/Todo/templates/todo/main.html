<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Todo List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300&display=swap" rel="stylesheet">
</head>

<style>
    body{
        background: #a8d7e1;
        font-family: 'Montserrat Alternates', sans-serif;
    }

    .container{
        max-width: 70%;
        margin: auto;
        background-color: #fff;
        -webkit-box-shadow: 2px 2px 13px -4px rgba(0, 0, 0, 0.21);
        box-shadow: 2px 2px 13px -4px rgba(0, 0, 0, 0.21);
    }

    input{
        outline: none;
        border: none;

    }

    .header-bar{
        display: flex;
        justify-content: space-between;
        color: #fff;
        padding: 10px;
        border-radius: 5px 5px 0 0;
        background: #37B;
    }

    .task-wrapper{
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color:#fff;
        border-top: 1px solid #dfe4ea
        overflow: hidden;
    }

    .task-title{
        display: flex;
        padding: 20px;
    }

    .task-title a {
        text-decoration: none;
        color: #4b5156;
        margin-left: 10px;
    }

    .task-complete-icon{
        height: 20px;
        width: 20px;
        background-color: rgb(0, 255, 0);
        border-radius: 50%;
    }

    .task-incomplete-icon {
        height: 20px;
        width: 20px;
        background-color: rgb(160, 160, 160);
        border-radius: 50%;
        }

    .delete-link {
        text-decoration: none;
        font-weight: 900;
        color: #6249cf;
        font-size: 22px;
        line-height: 0;
        padding: 20px 20px;
        }

    .header-bar a {
        color: rgb(247, 247, 247);
        text-decoration: none;
    }

    #add-link{
        color: #6249cf;
        text-decoration: none;
        font-size: 42px;
        text-shadow: 1px 1px #81413b;
    }

    #search-and-wrapper{
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
    }

    input[type=text],
    input[type=password],

    textarea {
        border: 1px solid #757575;
        border-radius: 5px;
        padding: 10px;
        width: 50%;
        }
    label{
        padding-top: 10px !important;
        display: block;
    }

    ::placeholder{
        font-weight: 300;
        opacity: 0.5;
    }

    .button{
        border: 1px solid #757575;
        background-color: #FFF;
        color: #6249cf;
        padding: 10px;
        font-size: 14px;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
    }

    .card-body{
        padding: 20px;
    }


</style>



<body>
    <div class = 'container'>
        {% block content %}


        {% endblock content %}
    </div>
</body>
</html>
