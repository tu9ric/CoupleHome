{% extends 'todo/main.html' %}

{% block content %}
<div class="form-page">
    <div class="header-bar">
        <a href="{% url 'events' %}">&#8592; Back to Dates</a>
    </div>

    <div class="card-body">
        <h1>Add important date</h1>
        <form action="" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input class="button" type="submit" value="Save date">
        </form>
    </div>
</div>
{% endblock content %}
